# Nixpacks config for Railway
[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = ["npm ci --prefer-offline --no-audit"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "sh -c 'set -e; if [ -z \"$DATABASE_URL\" ]; then echo \"[start] DATABASE_URL is required for prisma migrate deploy\"; exit 1; fi; echo \"[start] running prisma migrate deploy\"; npx prisma migrate deploy; echo \"[start] launching next server\"; npm run start'"
