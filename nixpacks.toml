# Nixpacks config for Railway
[phases.setup]
# pg_dump 18 is needed by /api/cron/db-backup to dump the Railway
# managed PG (currently 18.x). pg_dump refuses to dump a newer-major
# server with an older client, and Nixpacks' pinned nixpkgs revision
# only ships postgresql_17, so we install the PG-18 client via PGDG's
# official apt repo. nix still handles nodejs + openssl.
nixPkgs = ["nodejs_22", "openssl"]
aptPkgs = ["ca-certificates", "curl", "gnupg", "lsb-release"]
cmds = [
  "bash -c 'curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg'",
  "bash -c 'echo \"deb [signed-by=/etc/apt/trusted.gpg.d/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main\" > /etc/apt/sources.list.d/pgdg.list'",
  "apt-get update",
  "apt-get install -y --no-install-recommends postgresql-client-18",
  "pg_dump --version",
]

# Install phase is a deliberate no-op: npm ci + build + prune run in a
# single RUN below so pruning dev deps actually shrinks the final image.
# Docker preserves files across layers — a prune in a later layer only
# adds "whiteout" entries and earlier layers still carry the bulk.
[phases.install]
cmds = ["true"]

[phases.build]
# One-layer build:
#   1. npm ci (dev deps included — needed by next build + TS)
#   2. prisma generate (unset PRISMA_* first so nothing forces --no-engine)
#   3. next build
#   4. slim: drop .next/cache, drop stray source maps, npm prune --omit=dev
#
# Prisma CLI is a runtime dependency (package.json moved) so prune keeps
# it for the start command's `npx prisma migrate deploy`.
#
# Target: cut the 622 MB runtime image roughly in half (Playwright, TS,
# ESLint, Vitest, @types/* alone are ~300 MB of dev deps).
cmds = ['''bash -c 'set -e; echo "[build] npm ci..."; rm -rf node_modules .next; unset PRISMA_GENERATE_DATAPROXY PRISMA_GENERATE_NO_ENGINE PRISMA_CLIENT_DATA_PROXY_CLIENT_VERSION PRISMA_ACCELERATE_URL; npm ci --no-audit --no-fund; echo "[build] prisma generate..."; rm -rf node_modules/.prisma; npx prisma generate; grep -q "\"copyEngine\": true" node_modules/.prisma/client/index.js || { echo "ERROR: Prisma client generated with --no-engine"; exit 1; }; echo "[build] next build..."; npm run build; echo "[slim] before:"; du -sh node_modules .next 2>/dev/null || true; echo "[slim] drop .next/cache + stray source maps, prune dev deps..."; rm -rf .next/cache; find .next -type f -name "*.map" -delete; npm prune --omit=dev --no-audit --no-fund; echo "[slim] after:"; du -sh node_modules .next 2>/dev/null || true' ''']

[start]
# NODE_OPTIONS bumps the HTTP parser's max header size to 64KB so the
# Clerk frontend-API proxy rewrites (/clerk_*) don't crash Node when
# Clerk's response carries large Set-Cookie headers. Default is 16KB;
# Clerk's combined session + JWT cookies can exceed that in
# production. Railway was crash-looping on HPE_HEADER_OVERFLOW before.
#
# `timeout 45 prisma migrate deploy || echo` — if the advisory lock
# is held by a shutting-down old container, we wait up to 45s and
# then fall through. Next still starts so healthcheck can pass;
# pending migrations get applied on the next deploy. Without this,
# a lock race killed the whole container via `set -e`.
cmd = "sh -c 'export NODE_OPTIONS=\"--max-http-header-size=65536\"; echo \"[start $(date -u +%FT%TZ)] container up, running prisma migrate deploy\"; timeout 45 npx prisma migrate deploy || echo \"[start $(date -u +%FT%TZ)] migrate deploy timed out or failed (exit $?) — continuing so Next can still serve\"; echo \"[start $(date -u +%FT%TZ)] launching next server (NODE_OPTIONS=$NODE_OPTIONS)\"; exec npm run start'"
