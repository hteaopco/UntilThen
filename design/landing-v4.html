<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<meta name="supported-color-schemes" content="light">
<title>untilThen — Letters for the future</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:        #0f1f3d;
    --navy-mid:    #1e3560;
    --sky:         #4a9edd;
    --sky-light:   #7ab8e8;
    --sky-tint:    #edf5fc;
    --gold:        #c9a84c;
    --gold-light:  #e2c47a;
    --gold-tint:   #fdf6e3;
    --ink:         #0f1f3d;
    --ink-mid:     #4a5568;
    --ink-light:   #8896a5;
    --white:       #ffffff;
    --off-white:   #ffffff;
    --border:      rgba(15,31,61,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: #ffffff;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* —— LOGO —— */
  .logo-mark { display: block; }

  /* —— NAV —— */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 56px;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  nav ul { list-style: none; display: flex; gap: 32px; align-items: center; }
  nav ul a {
    text-decoration: none; font-size: 14px; font-weight: 500;
    color: var(--ink-mid); transition: color 0.2s;
  }
  nav ul a:hover { color: var(--ink); }

  .btn-nav {
    background: var(--navy); color: white;
    padding: 10px 22px; border-radius: 8px;
    font-size: 13px; font-weight: 700; text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-nav:hover { background: var(--navy-mid); transform: translateY(-1px); }

  /* —— HERO —— */
  .hero {
    min-height: 100vh;
    display: grid; grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 120px 56px 80px;
    gap: 80px; max-width: 1280px; margin: 0 auto;
  }

  .hero-left { position: relative; z-index: 2; }

  .hero-tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--sky);
    margin-bottom: 24px;
    background: var(--sky-tint);
    padding: 6px 14px; border-radius: 6px;
    opacity: 0; animation: fadeUp 0.5s 0.1s ease forwards;
  }

  .hero-headline {
    font-size: clamp(40px, 5vw, 64px);
    font-weight: 800; line-height: 1.05;
    letter-spacing: -2px; color: var(--navy);
    margin-bottom: 20px;
    opacity: 0; animation: fadeUp 0.6s 0.18s ease forwards;
  }

  .hero-headline .accent { color: var(--sky); font-weight: 300; }

  .hero-sub {
    font-size: 17px; font-weight: 400; line-height: 1.7;
    color: var(--ink-mid); max-width: 440px;
    margin-bottom: 40px;
    opacity: 0; animation: fadeUp 0.6s 0.26s ease forwards;
  }

  .hero-actions {
    display: flex; gap: 12px; align-items: center;
    opacity: 0; animation: fadeUp 0.6s 0.34s ease forwards;
  }

  .btn-primary {
    background: var(--navy); color: white;
    padding: 14px 28px; border-radius: 8px;
    font-size: 15px; font-weight: 700; text-decoration: none;
    transition: all 0.2s; letter-spacing: 0.01em;
    box-shadow: 0 4px 16px rgba(15,31,61,0.2);
  }
  .btn-primary:hover { background: var(--navy-mid); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(15,31,61,0.25); }

  .btn-ghost {
    font-size: 14px; font-weight: 500; color: var(--ink-mid);
    text-decoration: none; transition: color 0.2s;
  }
  .btn-ghost:hover { color: var(--ink); }

  /* Hero cards */
  .hero-right {
    position: relative; height: 480px;
    opacity: 0; animation: fadeUp 0.8s 0.5s ease forwards;
  }

  .letter-card {
    position: absolute; background: var(--white);
    border-radius: 16px; padding: 24px 26px;
    box-shadow: 0 4px 24px rgba(15,31,61,0.08), 0 1px 4px rgba(15,31,61,0.04);
    border: 1px solid var(--border);
  }

  .lc-1 { width: 300px; top: 0; left: 20px; transform: rotate(-1.5deg); animation: float1 6s ease-in-out infinite; z-index: 3; }
  .lc-2 { width: 280px; top: 130px; left: 0; transform: rotate(1.2deg); animation: float2 7s ease-in-out infinite; z-index: 2; background: var(--sky-tint); }
  .lc-3 { width: 260px; top: 250px; left: 50px; transform: rotate(-0.8deg); animation: float3 8s ease-in-out infinite; z-index: 1; background: var(--gold-tint); }

  @keyframes float1 { 0%,100%{transform:rotate(-1.5deg) translateY(0)} 50%{transform:rotate(-1.5deg) translateY(-10px)} }
  @keyframes float2 { 0%,100%{transform:rotate(1.2deg) translateY(0)} 50%{transform:rotate(1.2deg) translateY(-7px)} }
  @keyframes float3 { 0%,100%{transform:rotate(-0.8deg) translateY(0)} 50%{transform:rotate(-0.8deg) translateY(-12px)} }

  .card-to { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sky); margin-bottom: 6px; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 6px; line-height: 1.3; }
  .card-preview { font-size: 12px; color: var(--ink-light); line-height: 1.6; }
  .card-lock {
    display: flex; align-items: center; gap: 5px;
    margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border);
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--gold);
  }
  .lock-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }

  /* —— DIVIDER —— */
  .divider {
    display: flex; align-items: center; gap: 20px;
    padding: 0 56px; max-width: 1280px; margin: 0 auto;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

  /* —— SECTIONS —— */
  .section { padding: 96px 56px; max-width: 1280px; margin: 0 auto; }

  .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--sky);
    margin-bottom: 14px;
  }

  .section-title {
    font-size: clamp(30px, 3.5vw, 46px); font-weight: 800;
    letter-spacing: -1.5px; line-height: 1.08; color: var(--navy);
    margin-bottom: 64px; max-width: 520px;
  }
  .section-title em { font-style: italic; font-weight: 300; color: var(--sky); }

  /* Steps */
  .steps { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
  .step {
    background: #f8fafc; padding: 36px 32px;
    border-radius: 16px; border: 1px solid var(--border);
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .step:hover { background: var(--sky-tint); border-color: rgba(74,158,221,0.2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(15,31,61,0.08); }
  .step-num {
    font-size: 64px; font-weight: 800; color: var(--navy);
    opacity: 0.05; line-height: 1; margin-bottom: -18px; letter-spacing: -3px;
  }
  .step-emoji { font-size: 24px; display: block; margin-bottom: 14px; }
  .step-title { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 8px; letter-spacing: -0.3px; }
  .step-desc { font-size: 14px; line-height: 1.75; color: var(--ink-mid); font-weight: 400; }

  /* —— PROMISE —— */
  .promise {
    background: var(--navy); padding: 112px 56px;
    position: relative; overflow: hidden;
  }
  .promise::before {
    content: ''; position: absolute; top: -200px; right: -200px;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(74,158,221,0.1) 0%, transparent 70%);
  }
  .promise::after {
    content: ''; position: absolute; bottom: -100px; left: -100px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .promise-inner {
    max-width: 1280px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center; position: relative; z-index: 1;
  }

  .promise-quote {
    font-size: clamp(26px, 3vw, 42px); font-weight: 800;
    line-height: 1.15; letter-spacing: -1.5px; color: white;
  }
  .promise-quote em { font-style: italic; font-weight: 300; color: var(--sky-light); }
  .promise-attr { font-size: 13px; color: rgba(255,255,255,0.3); margin-top: 20px; font-style: italic; }

  .promise-desc {
    font-size: 17px; line-height: 1.8; color: rgba(255,255,255,0.55);
    font-weight: 300; margin-bottom: 32px;
  }

  .vault {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 24px;
  }
  .vault-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .vault-icon { width: 32px; height: 32px; background: var(--sky); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .vault-name { font-size: 14px; font-weight: 700; color: white; }
  .vault-count { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 1px; }
  .vault-countdown { text-align: center; padding: 14px 0; }
  .cd-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 4px; font-weight: 600; }
  .cd-num { font-size: 36px; font-weight: 800; color: var(--gold); letter-spacing: -2px; }
  .cd-sub { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 4px; font-style: italic; }
  .vault-entries { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
  .vault-entry { padding: 10px 12px; background: rgba(255,255,255,0.04); border-radius: 8px; border: 1px solid rgba(255,255,255,0.06); }
  .ve-title { font-size: 12px; color: rgba(255,255,255,0.45); font-style: italic; }
  .ve-meta { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }

  /* —— FEATURES —— */
  .features-section { background: #ffffff; padding: 96px 56px; }
  .features-inner { max-width: 1280px; margin: 0 auto; }
  .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 64px; }

  .feature {
    background: var(--white); padding: 36px;
    border-radius: 16px; border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .feature:hover { border-color: rgba(74,158,221,0.25); box-shadow: 0 8px 24px rgba(15,31,61,0.06); }
  .feature:first-child {
    grid-column: span 2; background: var(--navy);
    display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center;
  }
  .feature-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--sky);
    background: var(--sky-tint); padding: 4px 10px;
    border-radius: 6px; margin-bottom: 14px;
  }
  .feature:first-child .feature-badge { background: rgba(74,158,221,0.15); }
  .feature-title { font-size: 19px; font-weight: 700; color: var(--navy); margin-bottom: 10px; letter-spacing: -0.3px; line-height: 1.2; }
  .feature:first-child .feature-title { color: white; }
  .feature-body { font-size: 14px; line-height: 1.75; color: var(--ink-mid); }
  .feature:first-child .feature-body { color: rgba(255,255,255,0.55); font-weight: 300; }

  /* Mock editor */
  .mock-editor { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(15,31,61,0.1); border: 1px solid var(--border); }
  .mock-bar { display: flex; gap: 6px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .mock-btn { width: 26px; height: 26px; background: var(--off-white); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--ink-mid); border: 1px solid var(--border); }
  .mock-text { font-size: 13px; line-height: 1.8; color: var(--ink-mid); }
  .cursor { display: inline-block; width: 2px; height: 14px; background: var(--sky); margin-left: 1px; vertical-align: middle; animation: blink 1.1s infinite; }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .mock-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .mock-tag { font-size: 11px; color: var(--gold); font-weight: 700; display:flex; align-items:center; gap:4px; }
  .mock-seal { background: var(--navy); color: white; font-size: 11px; font-weight: 700; padding: 7px 14px; border-radius: 6px; }

  /* —— PRICING —— */
  .pricing { background: #ffffff; padding: 96px 56px; }
  .pricing-inner { max-width: 1280px; margin: 0 auto; }
  .pricing-header { margin-bottom: 56px; }
  .pricing-title { font-size: clamp(28px, 3.5vw, 44px); font-weight: 800; letter-spacing: -1.5px; color: var(--navy); margin-top: 10px; }
  .pricing-title em { font-style: italic; font-weight: 300; color: var(--sky); }
  .pricing-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }

  .pricing-card {
    background: var(--white); border: 1px solid var(--border);
    padding: 36px 32px; border-radius: 16px; transition: all 0.2s;
  }
  .pricing-card:hover { box-shadow: 0 8px 24px rgba(15,31,61,0.08); }
  .pricing-card.featured { background: var(--navy); border-color: var(--navy); }

  .pricing-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sky); display: block; margin-bottom: 16px; }
  .pricing-card.featured .pricing-tag { color: var(--sky-light); }
  .pricing-name { font-size: 20px; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; }
  .pricing-card.featured .pricing-name { color: white; }
  .pricing-price { font-size: 48px; font-weight: 800; color: var(--navy); letter-spacing: -2px; line-height: 1; margin: 16px 0 4px; }
  .pricing-card.featured .pricing-price { color: white; }
  .pricing-price sub { font-size: 20px; letter-spacing: 0; }
  .pricing-per { font-size: 12px; color: var(--ink-light); margin-bottom: 24px; font-style: italic; }
  .pricing-card.featured .pricing-per { color: rgba(255,255,255,0.4); }
  .pricing-features { list-style: none; display: flex; flex-direction: column; gap: 9px; margin-bottom: 28px; }
  .pricing-features li { font-size: 13px; color: var(--ink-mid); display: flex; align-items: flex-start; gap: 8px; line-height: 1.4; font-weight: 400; }
  .pricing-features li::before { content:'✦'; font-size:9px; color:var(--gold); flex-shrink:0; margin-top:3px; }
  .pricing-card.featured .pricing-features li { color: rgba(255,255,255,0.75); }
  .pricing-card.featured .pricing-features li::before { color: var(--gold-light); }

  .btn-plan { display: block; text-align: center; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; text-decoration: none; transition: all 0.2s; letter-spacing: 0.01em; }
  .btn-navy { background: var(--navy); color: white; }
  .btn-navy:hover { background: var(--navy-mid); }
  .btn-white { background: white; color: var(--navy); }
  .btn-white:hover { background: var(--sky-tint); }
  .btn-outline-navy { border: 1.5px solid var(--border); color: var(--ink-mid); }
  .btn-outline-navy:hover { border-color: var(--navy); color: var(--navy); }

  /* —— CTA —— */
  .cta { background: var(--white); padding: 112px 56px; text-align: center; }
  .cta-inner { max-width: 560px; margin: 0 auto; }
  .cta-headline { font-size: clamp(34px, 5vw, 58px); font-weight: 800; letter-spacing: -2px; line-height: 1.05; color: var(--navy); margin-bottom: 16px; }
  .cta-headline em { font-style: italic; font-weight: 300; color: var(--sky); }
  .cta-sub { font-size: 16px; color: var(--ink-mid); margin-bottom: 40px; font-weight: 400; }
  .email-row { display: flex; max-width: 420px; margin: 0 auto; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 20px rgba(15,31,61,0.12); border: 1px solid var(--border); }
  .email-input { flex: 1; padding: 15px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; border: none; background: white; color: var(--ink); outline: none; font-weight: 400; }
  .email-input::placeholder { color: var(--ink-light); }
  .email-btn { background: var(--navy); color: white; border: none; padding: 15px 22px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .email-btn:hover { background: var(--navy-mid); }
  .cta-note { font-size: 12px; color: var(--ink-light); margin-top: 14px; font-style: italic; }

  /* —— FOOTER —— */
  footer { background: var(--navy); color: white; padding: 36px 56px; display: flex; align-items: center; justify-content: space-between; }
  .footer-copy { font-size: 13px; opacity: 0.25; font-style: italic; }
  footer ul { list-style: none; display: flex; gap: 24px; }
  footer ul a { color: white; opacity: 0.3; font-size: 13px; text-decoration: none; transition: opacity 0.2s; font-weight: 400; }
  footer ul a:hover { opacity: 0.7; }

  /* —— ANIMATIONS —— */
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* —— RESPONSIVE —— */
  @media (max-width: 1024px) {
    nav { padding: 16px 24px; }
    nav ul { display: none; }
    .hero { grid-template-columns: 1fr; min-height: auto; padding: 100px 24px 60px; gap: 0; }
    .hero-right { display: none; }
    .section { padding: 64px 24px; }
    .steps { grid-template-columns: 1fr; gap: 16px; }
    .promise { padding: 72px 24px; }
    .promise-inner { grid-template-columns: 1fr; gap: 40px; }
    .features-section { padding: 64px 24px; }
    .features-grid { grid-template-columns: 1fr; gap: 16px; }
    .feature:first-child { grid-column: span 1; grid-template-columns: 1fr; }
    .pricing { padding: 64px 24px; }
    .pricing-grid { grid-template-columns: 1fr; gap: 16px; }
    .cta { padding: 80px 24px; }
    footer { flex-direction: column; gap: 20px; text-align: center; padding: 32px 24px; }
    .divider { padding: 0 24px; }
  }
</style>
</head>
<body>
<!-- The full body markup matches the section structure used by the React
     components in src/components/landing/. The HTML reference is kept here
     as the visual source of truth — see Nav.tsx, Hero.tsx, etc. -->
</body>
</html>
